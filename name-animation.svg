<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Deep background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d0d2b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>

    <!-- Name primary fill gradient - electric gold-to-cyan -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FF8C00"/>
      <stop offset="60%" style="stop-color:#00D9FF"/>
      <stop offset="100%" style="stop-color:#BF5FFF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Shimmer gradient sweeping across -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="40%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.45)"/>
      <stop offset="60%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-2 0; 2 0; -2 0" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tight sharp glow -->
    <filter id="sharpGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a3e" stroke-width="0.5"/>
    </pattern>

    <!-- Clip for scanline scroll -->
    <clipPath id="scanClip">
      <rect x="0" y="0" width="900" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="200" fill="url(#grid)" rx="12" opacity="0.5"/>

  <!-- Subtle horizontal scanlines -->
  <rect width="900" height="200" rx="12" fill="none"
    style="background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px)"/>

  <!-- Animated corner accent lines - top left -->
  <line x1="0" y1="30" x2="0" y2="0" stroke="#00D9FF" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.1s"/>
    <animate attributeName="x2" values="0;60;60" dur="1.2s" fill="freeze" begin="0.1s"/>
  </line>
  <line x1="30" y1="0" x2="0" y2="0" stroke="#00D9FF" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.1s"/>
    <animate attributeName="y2" values="0;60;60" dur="1.2s" fill="freeze" begin="0.1s"/>
  </line>

  <!-- Corner accents - top right -->
  <line x1="900" y1="0" x2="900" y2="0" stroke="#BF5FFF" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.2s"/>
    <animate attributeName="x1" values="900;840;840" dur="1.2s" fill="freeze" begin="0.2s"/>
  </line>
  <line x1="900" y1="0" x2="900" y2="0" stroke="#BF5FFF" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.2s"/>
    <animate attributeName="y2" values="0;60;60" dur="1.2s" fill="freeze" begin="0.2s"/>
  </line>

  <!-- Corner accents - bottom left -->
  <line x1="0" y1="200" x2="60" y2="200" stroke="#FFD700" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.3s"/>
  </line>
  <line x1="0" y1="200" x2="0" y2="140" stroke="#FFD700" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.3s"/>
  </line>

  <!-- Corner accents - bottom right -->
  <line x1="900" y1="200" x2="840" y2="200" stroke="#FF8C00" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.4s"/>
  </line>
  <line x1="900" y1="200" x2="900" y2="140" stroke="#FF8C00" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze" begin="0.4s"/>
  </line>

  <!-- Horizontal divider lines with animation -->
  <line x1="0" y1="170" x2="0" y2="170" stroke="url(#nameGrad)" stroke-width="1" opacity="0.4">
    <animate attributeName="x2" values="0;900;900" dur="1.8s" fill="freeze" begin="0.5s"/>
  </line>
  <line x1="900" y1="30" x2="900" y2="30" stroke="url(#nameGrad)" stroke-width="1" opacity="0.4">
    <animate attributeName="x1" values="900;0;0" dur="1.8s" fill="freeze" begin="0.5s"/>
  </line>

  <!-- Main name text - glow layer (fat, blurred) -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="18"
    fill="#00D9FF"
    filter="url(#glow)"
    opacity="0">
    ANJAN
    <animate attributeName="opacity" values="0;0.35;0.35" dur="0.8s" fill="freeze" begin="0.6s"/>
    <animateTransform attributeName="transform" type="scale" values="0.96 1; 1 1; 1 1" dur="0.8s" fill="freeze" begin="0.6s" additive="sum"/>
  </text>

  <!-- Main name text - core fill -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="18"
    fill="url(#nameGrad)"
    opacity="0">
    ANJAN
    <animate attributeName="opacity" values="0;1;1" dur="0.9s" fill="freeze" begin="0.6s"/>
    <animateTransform attributeName="transform" type="scale" values="0.94 0.94; 1 1; 1 1" dur="0.9s" fill="freeze" begin="0.6s" additive="sum"/>
  </text>

  <!-- Shimmer sweep over name -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="18"
    fill="url(#shimmer)"
    opacity="0.6">
    ANJAN
  </text>

  <!-- Stroke outline - animated draw -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="18"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1">
    ANJAN
  </text>

  <!-- Pulsing glow aura on name -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="18"
    fill="#FFD700"
    filter="url(#glow)"
    opacity="0">
    ANJAN
    <animate attributeName="opacity" values="0;0;0.12;0.05;0.12;0.05;0.1" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </text>

  <!-- Tagline below -->
  <text
    x="450" y="178"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="6"
    fill="#00D9FF"
    opacity="0"
    filter="url(#sharpGlow)">
    AI  &amp;  ML  ENGINEER  ·  RESEARCHER  ·  BUILDER
    <animate attributeName="opacity" values="0;0;0.9;0.9" dur="2s" fill="freeze" begin="1.1s"/>
  </text>

  <!-- Floating particles -->
  <!-- Particle 1 -->
  <circle cx="80" cy="50" r="2" fill="#00D9FF" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 15 -25; 0 0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Particle 2 -->
  <circle cx="820" cy="60" r="1.5" fill="#BF5FFF" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -10 -20; 0 0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <!-- Particle 3 -->
  <circle cx="150" cy="150" r="1.5" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 8 -30; 0 0" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <!-- Particle 4 -->
  <circle cx="750" cy="140" r="2" fill="#FF8C00" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -12 -22; 0 0" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <!-- Particle 5 -->
  <circle cx="450" cy="20" r="1.5" fill="#00D9FF" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="0.8s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 5 15; 0 0" dur="4s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <!-- Particle 6 -->
  <circle cx="300" cy="30" r="1" fill="#BF5FFF" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" repeatCount="indefinite" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -5 20; 0 0" dur="3.2s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <!-- Particle 7 -->
  <circle cx="600" cy="25" r="1" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.6s" repeatCount="indefinite" begin="1.2s"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 10 18; 0 0" dur="2.6s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- Horizontal scan line sweep effect -->
  <rect x="0" y="-4" width="900" height="3" fill="rgba(0,217,255,0.08)" clip-path="url(#scanClip)">
    <animateTransform attributeName="transform" type="translate" values="0 -10; 0 210; 0 -10" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
